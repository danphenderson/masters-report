version: 1
dispatch_id: D02-CLAIM-LOCK
source_commit: 371ba631f7cb24a3463e4923696218304bc6ff09
status: draft_blocked_missing_editorial_claim_inputs
required_terms:
  cross_model_1d_3d_comparisons:
    required_preferred_term: discrepancy
    prohibited_unqualified_term: error
    rationale: 1D-3D outputs are descriptive cross-model differences under a declared operator, not exact-solution or accepted-reference errors.
  error_allowed_only_for:
    - MMS against manufactured exact solution
    - exact-solution comparisons
    - accepted-reference comparisons with an explicit reference contract
    - numerical error norms internal to verification tables where the reference is declared
  verification_claim:
    required_phrase: bounded implementation-verification evidence
    prohibited_broadening:
      - validation claim
      - production-accuracy claim
      - pressure or FFR accuracy claim
      - clinical or physiological validation claim
  study_type:
    required_phrase: diagnostic cross-model comparison
  rest_result:
    required_phrase: non-well-balanced geometry-rest drift
  solver_variables:
    required:
      - a
      - q
    meaning:
      a: radius-squared solver area coordinate, a = R^2
      q: solver flow coordinate, q = Qphys / pi
  physical_variables:
    required:
      - Aphys
      - Qphys
    meaning:
      Aphys: physical circular area, Aphys = pi * a
      Qphys: physical circular flow, Qphys = pi * q
