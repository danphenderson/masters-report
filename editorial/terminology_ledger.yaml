guardrails:
  no_broadening:
    - Do not call C23/C40 outputs validation, accuracy, predictive evidence, clinical evidence, physiological evidence, or causal attribution.
    - Do not relabel rest-state drift as small or secondary; it is a central numerical limitation.
    - Do not infer 3D wall, boundary, rheology, material, displacement, or history metadata from the final-time velocity assets.
    - Do not infer exact time alignment from the 0.0005 s offset.
unresolved_gates:
  - id: UG-DG-DEGREE-RANGE
    description: Modal DG surface is stated as p=0,1,2 in methodology, while verification p-refinement runs through p=0,...,4.
    required_action: flag_only
  - id: UG-3D-GEOMETRY-STATUS
    description: Current versus reference 3D geometry status is unresolved.
    required_action: flag_only
  - id: UG-DISPLACEMENT-APPLICATION
    description: Whether displacement must be applied before plane cuts is unresolved.
    required_action: flag_only
  - id: UG-3D-METADATA
    description: 3D boundary, wall, rheology, material, and history metadata are absent or not fully persisted.
    required_action: flag_only
  - id: UG-TIME-RESAMPLING
    description: Whether exact 0.9995 s 1D resampling is available is unresolved.
    required_action: flag_only
