name: Coverage suite

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "packages/ops/**"
      - "packages/stenotic-hemodynamics/**"
      - "Pipfile"
      - "Pipfile.lock"
      - "packages/ops/pyproject.toml"
      - "packages/stenotic-hemodynamics/Project.toml"
      - "packages/stenotic-hemodynamics/Manifest.toml"
      - "README.md"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "packages/ops/**"
      - "packages/stenotic-hemodynamics/**"
      - "Pipfile"
      - "Pipfile.lock"
      - "packages/ops/pyproject.toml"
      - "packages/stenotic-hemodynamics/Project.toml"
      - "packages/stenotic-hemodynamics/Manifest.toml"
      - "README.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: coverage-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pipenv

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: "1.12"

      - name: Install Pipenv
        run: python -m pip install pipenv

      - name: Install dependencies
        run: pipenv install --dev

      - name: Instantiate Julia project
        run: packages/stenotic-hemodynamics/bin/julia-release -e 'using Pkg; Pkg.instantiate()'

      - name: Run coverage suite
        run: pipenv run ops-coverage-suite

      - name: Upload raw coverage artifacts
        uses: actions/upload-artifact@v5
        with:
          name: coverage-suite
          path: tmp/coverage/**
          if-no-files-found: error

      - name: Upload ops coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: tmp/coverage/ops/coverage.xml
          flags: ops
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

      - name: Upload Julia coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: tmp/coverage/julia/lcov.info
          flags: julia
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
