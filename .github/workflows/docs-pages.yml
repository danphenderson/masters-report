name: Docs Pages

on:
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/docs-pages.yml'
      - 'docusaurus.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'sidebars.js'
      - 'public/docs/**'
      - 'src/css/**'
      - 'static/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/docs-pages.yml'
      - 'docusaurus.config.js'
      - 'package.json'
      - 'package-lock.json'
      - 'sidebars.js'
      - 'public/docs/**'
      - 'src/css/**'
      - 'static/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs:build

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: build

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
